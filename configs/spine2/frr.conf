! spine2 - AS 65002 - underlay + EVPN route reflector
!
frr defaults datacenter
hostname spine2
log stdout
!
ip forwarding
ipv6 forwarding
!
interface lo
 ip address 10.0.0.2/32
!
interface eth1
 description to-leaf1
 no shutdown
!
interface eth2
 description to-leaf2
 no shutdown
!
interface eth3
 description to-leaf3
 no shutdown
!
router bgp 65002
 bgp router-id 10.0.0.2
 bgp bestpath as-path multipath-relax
 no bgp default ipv4-unicast
 neighbor FABRIC peer-group
 neighbor FABRIC remote-as external
 neighbor FABRIC capability extended-nexthop
 neighbor FABRIC bfd profile FABRIC
 neighbor FABRIC ttl-security hops 1
 neighbor FABRIC advertisement-interval 0
 neighbor FABRIC timers 3 9
 neighbor FABRIC timers connect 5
 neighbor eth1 interface peer-group FABRIC
 neighbor eth2 interface peer-group FABRIC
 neighbor eth3 interface peer-group FABRIC
 !
 address-family ipv4 unicast
  redistribute connected
  neighbor FABRIC activate
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor FABRIC activate
 exit-address-family
!
bfd
 profile FABRIC
  transmit-interval 150
  receive-interval 150
  detect-multiplier 3
 exit
exit
!
end
