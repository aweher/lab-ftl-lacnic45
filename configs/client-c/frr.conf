! client-c - AS 64603 - multi-homed ESI-LAG
frr defaults traditional
hostname client-c
log stdout
!
router bgp 64603
 bgp router-id 192.0.2.30
 no bgp ebgp-requires-policy
 neighbor 100.64.0.10 remote-as 64601
 neighbor 100.64.0.20 remote-as 64602
 !
 address-family ipv4 unicast
  network 192.0.2.30/32
  neighbor 100.64.0.10 activate
  neighbor 100.64.0.20 activate
 exit-address-family
!
end
