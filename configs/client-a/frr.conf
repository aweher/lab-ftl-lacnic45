! client-a - AS 64601 - cliente del IXP
frr defaults traditional
hostname client-a
log stdout
!
router bgp 64601
 bgp router-id 192.0.2.10
 no bgp ebgp-requires-policy
 neighbor 100.64.0.20 remote-as 64602
 neighbor 100.64.0.30 remote-as 64603
 !
 address-family ipv4 unicast
  network 192.0.2.10/32
  neighbor 100.64.0.20 activate
  neighbor 100.64.0.30 activate
 exit-address-family
!
end
