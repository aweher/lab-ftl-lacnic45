! client-b - AS 64602
frr defaults traditional
hostname client-b
log stdout
!
router bgp 64602
 bgp router-id 192.0.2.20
 no bgp ebgp-requires-policy
 neighbor 100.64.0.10 remote-as 64601
 neighbor 100.64.0.30 remote-as 64603
 !
 address-family ipv4 unicast
  network 192.0.2.20/32
  neighbor 100.64.0.10 activate
  neighbor 100.64.0.30 activate
 exit-address-family
!
end
